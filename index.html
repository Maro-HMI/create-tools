<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Creative Technology Tools</title>
  <meta name="description" content="Root page for Creative Technology tools and projects.">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f6f3;
      --fg: #1f1f1c;
      --muted: #66665f;
      --card: #ffffff;
      --border: #d9d9d2;
      --accent: #0b6b6f;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #171715;
        --fg: #ecece7;
        --muted: #a8a89f;
        --card: #21211e;
        --border: #34342f;
        --accent: #67b8bd;
      }
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 4rem 1.5rem;
      display: grid;
      align-content: center;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
    }

    h1 {
      margin: 0 0 1rem 0;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1.1;
    }

    p {
      margin: 0 0 1rem 0;
      color: var(--muted);
      max-width: 60ch;
    }

    .note {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.95rem;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover,
    a:focus {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Creative Technology Tools</h1>
      <p>
        This is the root page for a collection of Creative Technology tools and project sites.
      </p>
      <p>
        Individual tools and experiments are published in their own subfolders from separate GitLab projects.
      </p>
      <p class="note">
        Project links will appear here over time.
      </p>
    </section>
  </main>
</body>
</html>
